name: ci

# Build, lint, and run the cross-platform unit tests. The runner is macOS because
# the HVF backend (amber-hvf) links Hypervisor.framework and only compiles there;
# the unit tests themselves drive no vcpu, so no entitlement or nested virt is
# needed. The end-to-end pipeline (boot/snapshot/fork/exec) is covered by
# scripts/integration-test.sh, which needs real HVF + assets and runs locally.

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - run: rustup component add clippy
      - name: clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: unit tests
        run: cargo test --workspace

  # The Linux sandbox (seccomp + Landlock) is the host-protection barrier and is
  # untestable on macOS, so it gets its own arm64-Linux job. Cheap: build + run the
  # in-process probe that applies the real policy and checks exec/writes are denied
  # and a granted dir/socket is allowed. Needs a Landlock-capable kernel (Ubuntu's).
  lockdown-linux:
    name: linux lockdown (seccomp + landlock)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - name: kernel + LSM diagnostic
        run: |
          uname -r
          cat /sys/kernel/security/lsm 2>/dev/null || echo "no /sys/kernel/security/lsm"
      # The macOS gate can't lint Linux-only code (the KVM backend, the /proc and
      # seccomp/Landlock paths), so clippy them here.
      - run: rustup component add clippy
      - name: clippy linux-only code (warnings are errors)
        run: cargo clippy -p amber -p amber-kvm --all-targets -- -D warnings
      - name: build amber
        run: cargo build -p amber
      - name: deny exec + writes (default policy)
        run: ./target/debug/amber __lockdown-probe | grep -q LOCKDOWN_OK
      - name: grant the allowed dir + network
        run: ./target/debug/amber __lockdown-probe "$(mktemp -d)" | grep -q LOCKDOWN_OK
