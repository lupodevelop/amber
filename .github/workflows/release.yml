name: release

# Produce ready-to-run amber bundles — the binary plus the resin guest kernel,
# the in-guest agent, and the busybox/musl userland — for macOS and Linux arm64.
# The guest artifacts are host-independent, so they're built once on Linux arm64
# (Docker, native) and bundled with each host binary. Tagging `v*` also publishes
# them to a GitHub Release; `workflow_dispatch` just uploads workflow artifacts.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write      # keyless signing for build provenance
  attestations: write  # publish the provenance attestation

jobs:
  assets:
    name: guest assets (resin kernel + agent + userland)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - name: resin kernel -> assets/Image
        run: make kernel
      - name: in-guest agent -> assets/amber-agent
        run: ./scripts/build-agent.sh
      - name: userland -> assets/irx
        run: ./scripts/fetch-assets.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: assets
          path: assets/
          retention-days: 1

  bundle-linux:
    name: linux arm64 bundle
    needs: assets
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - run: cargo build --release -p amber
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with: { name: assets, path: assets/ }
      - run: ./scripts/package-release.sh linux arm64
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with: { name: amber-linux-arm64, path: dist/amber-linux-arm64.tar.gz }

  bundle-macos:
    name: macos arm64 bundle
    needs: assets
    # macOS 15+: the HVF backend links hv_gic_* (in-kernel GIC), added in macOS 15.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - run: cargo build --release -p amber
      - name: codesign (ad-hoc, with the HVF entitlement)
        run: codesign --entitlements amber.entitlements -s - target/release/amber
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with: { name: assets, path: assets/ }
      - run: ./scripts/package-release.sh macos arm64
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with: { name: amber-macos-arm64, path: dist/amber-macos-arm64.tar.gz }

  release:
    name: publish release
    needs: [bundle-linux, bundle-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with: { pattern: amber-*, merge-multiple: true, path: dist/ }
      - name: checksums
        run: cd dist && sha256sum amber-*.tar.gz | tee SHA256SUMS
      - name: build provenance (verify later with `gh attestation verify`)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: dist/amber-*.tar.gz
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/amber-*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
